name: Build & Push Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"          # also trigger on semantic version tags, e.g. v1.2.3

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Generate image metadata / tags ────────────────────────────────────
      # Produces tags such as:
      #   styrbjornkall/nidingen-dashboard:main          (branch name)
      #   styrbjornkall/nidingen-dashboard:20260226      (push date)
      #   styrbjornkall/nidingen-dashboard:sha-abc1234   (short commit SHA)
      #   styrbjornkall/nidingen-dashboard:v1.2.3        (semver tag, if pushed)
      #   styrbjornkall/nidingen-dashboard:latest        (only on semver tags)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/nidingen-dashboard
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYYMMDD'}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 3. Set up QEMU (for cross-platform builds) ───────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 4. Set up Docker Buildx ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Log in to Docker Hub ──────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 6. Build and push ────────────────────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64          # Serve runs on amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha           # GitHub Actions layer cache
          cache-to: type=gha,mode=max
